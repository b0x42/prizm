version: 2
updates:
  # Swift Package Manager (Xcode project)
  - package-ecosystem: "swift"
    directory: "/Prizm"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
