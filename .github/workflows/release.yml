name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-dmg:
    name: Build & Package DMG
    runs-on: macos-15
    permissions:
      contents: write   # needed to create the GitHub release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer

      - name: Create signing config (unsigned release build)
        run: cp Macwarden/LocalConfig.xcconfig.template Macwarden/LocalConfig.xcconfig

      - name: Build Release (no signing)
        run: |
          xcodebuild \
            -project "Macwarden/Macwarden.xcodeproj" \
            -scheme "Macwarden" \
            -configuration Release \
            -derivedDataPath build/ \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || exit ${PIPESTATUS[0]}

      - name: Create DMG
        run: |
          APP="build/Build/Products/Release/Macwarden.app"
          VERSION="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          DMG_NAME="Macwarden-${VERSION}.dmg"

          # Build a staging folder: app + Applications shortcut so users can drag-install.
          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/Macwarden.app"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Macwarden ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          echo "DMG_PATH=$DMG_NAME" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
