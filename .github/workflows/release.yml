name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - name: Check semver format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not valid semver (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi

  test:
    name: Test
    runs-on: macos-26
    needs: validate-tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create signing config
        run: cp Prizm/LocalConfig.xcconfig.template Prizm/LocalConfig.xcconfig

      - name: Run tests
        run: |
          xcodebuild test \
            -project "Prizm/Prizm.xcodeproj" \
            -scheme "Prizm" \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit ${PIPESTATUS[0]}

  build-dmg:
    name: Build & Package DMG
    runs-on: macos-26
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Create signing config (unsigned release build)
        run: cp Prizm/LocalConfig.xcconfig.template Prizm/LocalConfig.xcconfig

      - name: Build Release (no signing)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild \
            -project "Prizm/Prizm.xcodeproj" \
            -scheme "Prizm" \
            -configuration Release \
            -derivedDataPath build/ \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            build | xcpretty || exit ${PIPESTATUS[0]}

      - name: Create DMG
        run: |
          APP="build/Build/Products/Release/Prizm.app"
          VERSION="${GITHUB_REF_NAME}"
          DMG_NAME="Prizm-${VERSION}.dmg"

          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/Prizm.app"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Prizm ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          echo "DMG_PATH=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG to GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          draft: true
          generate_release_notes: true

      - name: Update Homebrew cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${TAP_GITHUB_TOKEN:-}" ]]; then
            echo "::warning::TAP_GITHUB_TOKEN is not set — skipping Homebrew cask update"
            exit 0
          fi

          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          VERSION="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/b0x42/homebrew-prizm.git" tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/prizm.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/prizm.rb

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Update prizm to ${VERSION}"
          git push || {
            echo "::error::Homebrew cask push failed for ${VERSION} — update b0x42/homebrew-prizm manually. SHA: ${SHA}"
            exit 1
          }
