name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-dmg:
    name: Build & Package DMG
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer

      - name: Create signing config (unsigned release build)
        run: cp Prizm/LocalConfig.xcconfig.template Prizm/LocalConfig.xcconfig

      - name: Build Release (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project "Prizm/Prizm.xcodeproj" \
            -scheme "Prizm" \
            -configuration Release \
            -derivedDataPath build/ \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      - name: Create DMG
        run: |
          APP="build/Build/Products/Release/Prizm.app"
          VERSION="${GITHUB_REF_NAME}"
          DMG_NAME="Prizm-${VERSION}.dmg"

          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/Prizm.app"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Prizm ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          echo "DMG_PATH=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}

      - name: Update Homebrew cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          VERSION="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/b0x42/homebrew-prizm.git" tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/prizm.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/prizm.rb

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Update prizm to ${VERSION}"
          git push
