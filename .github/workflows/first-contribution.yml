name: First Contribution

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Hello there @${{ github.actor }}! 👋

            Thank you and congrats 🎉 for opening your first PR! We will try to review it soon!
          issue-message: |
            Hello there @${{ github.actor }}! 👋

            Thank you for opening your first issue! We will try to respond soon!
